networks:
  soc-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  opensearch-data:
  wazuh-manager-data:
  thehive-data:
  thehive-db-data:
  cortex-opensearch-data:
  shuffle-data:
  filebeat-data:
  suricata-logs:

services:

  # ── OpenSearch ────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: soc-opensearch
    restart: unless-stopped
    environment:
      - cluster.name=soc-cluster
      - node.name=soc-opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g"
      - compatibility.override_main_response_version=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - indices.query.bool.max_clause_count=4096
      - action.destructive_requires_name=true
      - plugins.security.ssl.http.enabled=true
      - plugins.security.ssl.http.pemcert_filepath=certs/node.pem
      - plugins.security.ssl.http.pemkey_filepath=certs/node-key.pem
      - plugins.security.ssl.http.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.ssl.transport.pemcert_filepath=certs/node.pem
      - plugins.security.ssl.transport.pemkey_filepath=certs/node-key.pem
      - plugins.security.ssl.transport.pemtrustedcas_filepath=certs/root-ca.pem
      - plugins.security.ssl.transport.enforce_hostname_verification=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      - ./platform/opensearch/certs:/usr/share/opensearch/config/certs:ro
    ports:
      - "9200:9200"
    networks:
      soc-internal:
        aliases:
          - shuffle-opensearch
          - wazuh.indexer
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:${OPENSEARCH_ADMIN_PASSWORD} https://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 90s

  # ── Wazuh Manager ─────────────────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:4.8.0
    container_name: soc-wazuh-manager
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - INDEXER_URL=https://opensearch:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - FILEBEAT_SSL_VERIFICATION_MODE=none
      - API_USERNAME=${WAZUH_API_USERNAME}
      - API_PASSWORD=${WAZUH_API_PASSWORD}
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - ./platform/wazuh/config/ossec.conf:/var/ossec/etc/ossec.conf:ro
      - ./platform/wazuh/rules/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
      - ./platform/wazuh/rules/custom_rules.xml:/var/ossec/etc/rules/custom_rules.xml:ro
      - ./platform/wazuh/decoders/local_decoder.xml:/var/ossec/etc/decoders/local_decoder.xml:ro
      - ./platform/wazuh/integrations/shuffle-execute.py:/var/ossec/integrations/shuffle.py
      - ./platform/wazuh/config/ar.conf:/var/ossec/etc/shared/ar.conf
      - suricata-logs:/var/log/suricata:ro
    ports:
      - "1514:1514/udp"
      - "1514:1514/tcp"
      - "1515:1515/tcp"
      - "55000:55000/tcp"
    networks:
      - soc-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u ${WAZUH_API_USERNAME}:${WAZUH_API_PASSWORD} -X GET https://localhost:55000/security/user/authenticate | grep -q token"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── Wazuh Dashboard ───────────────────────────────────────────
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.8.0
    container_name: soc-wazuh-dashboard
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy
      wazuh-manager:
        condition: service_healthy
    environment:
      - OPENSEARCH_HOSTS=https://opensearch:9200
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - SERVER_HOST=0.0.0.0
      - SERVER_SSL_ENABLED=false
    volumes:
      - ./platform/wazuh-dashboard/config/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml:ro
      - ./platform/wazuh-dashboard/config/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
    ports:
      - "5601:5601"
    networks:
      - soc-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q 'green'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── TheHive DB (Cassandra) ─────────────────────────────────────
  thehive-db:
    image: cassandra:4.1.4
    container_name: soc-thehive-db
    restart: unless-stopped
    environment:
      - CASSANDRA_CLUSTER_NAME=soc-thehive
      - CASSANDRA_DC=dc1
      - HEAP_NEWSIZE=128M
      - MAX_HEAP_SIZE=512M
    volumes:
      - thehive-db-data:/var/lib/cassandra
    networks:
      - soc-internal
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' 2>/dev/null | grep -q 'soc-thehive'"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 90s

  # ── TheHive 5 ─────────────────────────────────────────────────
  thehive:
    image: strangebee/thehive:5.3.4
    container_name: soc-thehive
    restart: unless-stopped
    depends_on:
      thehive-db:
        condition: service_healthy
      cortex:
        condition: service_healthy
    environment:
      - TH_SECRET=${THEHIVE_SECRET}
      - TH_DB_CASSANDRA_HOSTNAMES=thehive-db
      - TH_CORTEX_URLS=http://cortex:9001
      - TH_CORTEX_KEYS=${CORTEX_THEHIVE_API_KEY}
    volumes:
      - thehive-data:/opt/thp/thehive/data
      - ./platform/thehive/config/application.conf:/etc/thehive/application.conf:ro
    ports:
      - "9000:9000"
    networks:
      - soc-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9000/api/v1/status | grep -qE '^(200|401)'"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 120s

  # ── Cortex OpenSearch ──────────────────────────────────────────
  cortex-opensearch:
    image: opensearchproject/opensearch:1.3.14
    container_name: soc-cortex-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - cortex-opensearch-data:/usr/share/opensearch/data
    networks:
      - soc-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '(green|yellow)'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Cortex ────────────────────────────────────────────────────
  cortex:
    image: thehiveproject/cortex:3.1.8
    container_name: soc-cortex
    restart: unless-stopped
    depends_on:
      cortex-opensearch:
        condition: service_healthy
    environment:
      - job_directory=${CORTEX_JOBS_PATH}
      - CORTEX_SECRET=${CORTEX_SECRET}
    volumes:
      - ${CORTEX_JOBS_PATH}:${CORTEX_JOBS_PATH}
      - /var/run/docker.sock:/var/run/docker.sock
      - ./platform/cortex/config/application.conf:/etc/cortex/application.conf:ro
    ports:
      - "9001:9001"
    networks:
      - soc-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9001/api/status | grep -q 'Cortex'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Suricata IDS ───────────────────────────────────────────────
  # Linux: host network (AF_PACKET). Use docker-compose.mac.yml on macOS.
  # Use docker-compose.win.yml on Windows (Suricata disabled — WSL2 limitation).
  suricata:
    image: jasonish/suricata:7.0.4
    container_name: soc-suricata
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - SURICATA_OPTIONS=-i ${SURICATA_INTERFACE:-eth0} --af-packet
    volumes:
      - ./platform/suricata/config/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./platform/suricata/rules/local.rules:/var/lib/suricata/rules/local.rules:ro
      - ./platform/suricata/threshold.config:/etc/suricata/threshold.config:ro
      - suricata-logs:/var/log/suricata
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/log/suricata/suricata.log && grep -qi 'engine started' /var/log/suricata/suricata.log"]
      interval: 30s
      timeout: 10s
      retries: 12
      start_period: 60s

  # ── Filebeat (Suricata → OpenSearch) ──────────────────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.14.0
    container_name: soc-filebeat
    restart: unless-stopped
    user: root
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - OPENSEARCH_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
    volumes:
      - ./platform/filebeat/config/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - suricata-logs:/var/log/suricata:ro
      - filebeat-data:/usr/share/filebeat/data
    networks:
      - soc-internal
    healthcheck:
      test: ["CMD-SHELL", "filebeat test config 2>&1 | grep -q 'Config OK'"]
      interval: 30s
      timeout: 15s
      retries: 8
      start_period: 60s

  # ── Shuffle Backend ───────────────────────────────────────────
  shuffle-backend:
    image: ghcr.io/shuffle/shuffle-backend:1.4.0
    container_name: soc-soar-backend
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      - SHUFFLE_APP_HOTLOAD_FOLDER=/shuffle-apps
      - SHUFFLE_FILE_LOCATION=/shuffle-files
      - OPENSEARCH_URL=https://opensearch:9200
      - SHUFFLE_OPENSEARCH_USERNAME=admin
      - SHUFFLE_OPENSEARCH_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - SHUFFLE_ENCRYPTION_MODIFIER=${SHUFFLE_ENCRYPTION_KEY}
      - BASE_URL=http://shuffle-backend:5001
      - SHUFFLE_PASS_WORKER_PROXY=true
      - SHUFFLE_DEFAULT_USERNAME=${SHUFFLE_DEFAULT_USERNAME}
      - SHUFFLE_DEFAULT_PASSWORD=${SHUFFLE_DEFAULT_PASSWORD}
    volumes:
      - shuffle-data:/shuffle-files
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "5001:5001"
    networks:
      - soc-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/api/v1/health 2>/dev/null | grep -qE '\"success\":(true|false)'"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s

  # ── Shuffle Frontend ──────────────────────────────────────────
  shuffle-frontend:
    image: ghcr.io/shuffle/shuffle-frontend:1.4.0
    container_name: soc-soar-frontend
    restart: unless-stopped
    depends_on:
      shuffle-backend:
        condition: service_healthy
    environment:
      - BACKEND_HOSTNAME=shuffle-backend
      - BACKEND_PORT=5001
    volumes:
      - ./platform/shuffle/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3001:80"
    networks:
      - soc-internal

  # ── Shuffle Orborus (workflow executor) ───────────────────────
  shuffle-orborus:
    image: ghcr.io/shuffle/shuffle-orborus:1.4.0
    container_name: soc-shuffle-orborus
    restart: unless-stopped
    depends_on:
      shuffle-backend:
        condition: service_healthy
    environment:
      - ENVIRONMENT_NAME=Shuffle
      - BASE_URL=http://shuffle-backend:5001
      - DOCKER_API_VERSION=1.44
      - CLEANUP=false
      - SHUFFLE_WORKER_IMAGE=ghcr.io/shuffle/shuffle-worker:latest
      - SHUFFLE_WORKER_NETWORK=${COMPOSE_PROJECT_NAME:-fortark-soc-lab}_soc-internal
      - SHUFFLE_BASE_IMAGE_NAME=shuffle-worker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - soc-internal

  # ── Kali Linux (attacker) ─────────────────────────────────────
  kali:
    image: kasmweb/kali-rolling-desktop:1.15.0
    container_name: soc-kali
    restart: unless-stopped
    environment:
      - VNC_PW=${KALI_VNC_PASSWORD}
    ports:
      - "7681:6901"
    networks:
      - soc-internal
    shm_size: 512m

  # ── Lab Target (victim SSH server) ────────────────────────────
  lab-target:
    image: ubuntu:22.04
    container_name: lab-target
    restart: unless-stopped
    hostname: lab-target
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq openssh-server curl wget net-tools procps sudo &&
        useradd -m -s /bin/bash victim &&
        HASH=\$$(openssl passwd -6 password123) &&
        usermod -p \"\$$HASH\" victim &&
        mkdir -p /run/sshd &&
        sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
        sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config &&
        echo 'MaxAuthTries 10' >> /etc/ssh/sshd_config &&
        /usr/sbin/sshd -D
      "
    ports:
      - "2221:22"
    networks:
      soc-internal:
        aliases:
          - lab-target

  # ── SOC Tools Dashboard ───────────────────────────────────────
  soc-client:
    build: ./platform/soc-client
    container_name: soc-client
    restart: unless-stopped
    env_file: .env
    environment:
      - OPENSEARCH_URL=https://soc-opensearch:9200
      - OPENSEARCH_USER=admin
      - THEHIVE_URL=http://soc-thehive:9000
      - CORTEX_URL=http://soc-cortex:9001
    ports:
      - "8000:8000"
    networks:
      - soc-internal
